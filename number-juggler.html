<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Odd or Even Game</title>
  <link rel="stylesheet" href="number-juggler-style.css">
</head>

<body>

  <!-- GLOBAL BACK BUTTON -->
  <button id="backBtn">← Back</button>

  <!-- SOUND BUTTON -->
  <button id="soundBtn">🔊 Sound ON</button>

  <div class="container">

    <!-- INTRO SCREEN -->
    <div id="introScreen" class="intro-screen">

  <!-- INTRO BACK BUTTON -->
  <button id="introBackBtn">← Back</button>

  <div class="intro-card">

        <h1>
          Number Juggler
        </h1>

        <p class="intro-text">
          Choose the correct answer as quickly and accurately as possible.
        </p>

        <div class="how-to-play">

          <h3>How to Play</h3>

          <p>1. Read the question carefully</p>

          <p>2. Select the correct answer</p>

          <p>3. Some levels may include timers</p>

          <p>4. Try to score as many points as possible</p>

        </div>

        <button id="startGameBtn">
          ▶ Start Game
        </button>

      </div>

    </div>

    <!-- TOP BAR -->
    <div class="top-bar">
     
      <div class="top-bar-level">
        Level: <span id="level">1</span>
      </div>

      <div class="top-bar-score">
        Score: <span id="score">0</span>
      </div>

      <div class="top-bar-lives">
        ❤️ ❤️ ❤️ ❤️ ❤️
      </div>

      <div id="timerDisplay">
        Time: --
      </div>

    </div>

    <!-- GAME BOX -->
    <div class="game-box">

      <h2 id="instruction">Get Ready</h2>

      <div id="mainDisplay">3</div>

    </div>

    <!-- BUTTONS -->
    <div class="buttons">
      <button id="leftBtn">ODD</button>
      <button id="rightBtn">EVEN</button>
    </div>

  </div>

  <script src="number-juggler-script.js"></script>

</body>
</html>
