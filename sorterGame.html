<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sorter Game</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: Arial, sans-serif;
  background: #f8f6f3;
  overflow-x: hidden;
}

.header {
  width: 100%;
  height: 60px;
  background: #fff;
  border-bottom: 1px solid #ddd;
  display: flex;
  align-items: center;
  justify-content: center;
  position: fixed;
  top: 0;
  left: 0;
  z-index: 1000;
}

.back-btn {
  position: absolute;
  left: 15px;
  background: none;
  border: none;
  font-size: 18px;
  color: #6c5ce7;
  font-weight: bold;
  cursor: pointer;
}

#menuScreen {
  width: 100%;
  min-height: 100vh;
  padding-top: 70px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  gap: 20px;
}

.menu-card,
.how-card {
  width: 90%;
  max-width: 420px;
  background: white;
  border-radius: 20px;
  padding: 28px;
  text-align: center;
  box-shadow: 0 4px 20px rgba(0,0,0,0.08);
}

.icon {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  background: linear-gradient(135deg,#6c5ce7,#4834d4);
  color: white;
  font-size: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: auto;
}

.menu-card h1 {
  margin-top: 15px;
  font-size: 34px;
}

.tag {
  display: inline-block;
  margin-top: 10px;
  background: #eee9ff;
  color: #6c5ce7;
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 13px;
}

.desc {
  margin-top: 15px;
  color: #666;
}

.how-card {
  text-align: left;
}

.how-card h2 {
  margin-bottom: 15px;
}

.step {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 12px 0;
}

.num {
  width: 34px;
  height: 34px;
  background: #f1ede7;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
}

.start-btn {
  width: 90%;
  max-width: 420px;
  height: 60px;
  border: none;
  border-radius: 16px;
  background: linear-gradient(135deg,#6c5ce7,#4834d4);
  color: white;
  font-size: 22px;
  font-weight: bold;
  cursor: pointer;
}

#gameScreen {
  display: none;
  width: 100%;
  min-height: 100vh;
  padding-top: 65px;
  padding-bottom: 12px;
  flex-direction: column;
  justify-content: flex-start;
  align-items: center;
  text-align: center;
  overflow-y: auto;
}

.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  width: 100%;
  max-width: 620px;
  margin: 0 auto 18px auto;
  padding: 8px 10px;
  background: transparent;
  box-shadow: none;
  border-radius: 0;
  font-weight: bold;
  font-size: 16px;
}

.top-bar div {
  flex: 1;
  text-align: center;
}

.rule {
  font-size: 20px;
  font-weight: bold;
  margin-bottom: 22px;
}

canvas {
  width: 75vw;
  height: 75vw;
  max-width: 420px;
  max-height: 420px;
  display: block;
}

.buttons {
  display: flex;
  gap: 12px;
  width: 90%;
  max-width: 360px;
  margin-top: 24px;
}

.buttons button {
  flex: 1;
  height: 50px;
  border: none;
  border-radius: 10px;
  color: white;
  font-size: 15px;
  font-weight: bold;
  cursor: pointer;
}

.left {
  background: #d96f6f;
}

.right {
  background: #56aeea;
}

.restart {
  background: #8f8f8f;
}

#result {
  margin-top: 15px;
  font-size: 22px;
  font-weight: bold;
  min-height: 30px;
}

#finalScore {
  margin-top: 8px;
  font-size: 20px;
  font-weight: bold;
}

@media(max-width: 600px) {
  .top-bar {
    font-size: 14px;
  }

  .rule {
    font-size: 17px;
  }

  canvas {
    width: 75vw;
    height: 75vw;
  }

  .buttons button {
    font-size: 13px;
  }
}
 /* 💻 LAPTOP / DESKTOP FIX */
@media (min-width: 900px) {

  #gameScreen {
    height: 100vh;
    overflow: hidden;   /* ✅ stop scroll ONLY on laptop */
    justify-content: flex-start;
  }

  .top-bar {
    margin-bottom: 8px;
    font-size: 14px;
  }

  .rule {
    font-size: 18px;
    margin-bottom: 10px;
  }

  canvas {
    width: 280px;   /* ✅ reduce size */
    height: 280px;
    max-width: 280px;
    max-height: 280px;
  }

  .buttons {
    margin-top: 12px;
  }

  .buttons button {
    height: 42px;
    font-size: 13px;
  }

  #result {
    font-size: 16px;
    margin-top: 8px;
  }

  #finalScore {
    font-size: 15px;
  }
} 

/* LANDSCAPE MODE FIX */
@media (orientation: landscape) and (max-height: 520px) {
  body {
    overflow-x: hidden;
    overflow-y:auto;
  }

  .header {
    height: 42px;
  }

  .back-btn {
    font-size: 14px;
  }

  #gameScreen {
    min-height: 100dvh;
    padding-top: 42px;
    padding-bottom: 6px;
    justify-content: flex-start;
    height:auto;
    overflow-y:auto;
  }

  .top-bar {
    max-width: 620px;
    font-size: 12px;
    margin-bottom: 4px;
    padding: 4px 8px;
  }

  .rule {
    font-size: 13px;
    margin-bottom: 4px;
    line-height: 1.2;
  }

  canvas {
    width: 38vh;
    height: 38vh;
    max-width: 180px;
    max-height: 180px;
  }

  .buttons {
    margin-top: 6px;
    max-width: 300px;
    gap: 8px;
  }

  .buttons button {
    height: 34px;
    font-size: 11px;
    border-radius: 8px;
  }

  #result {
    margin-top: 5px;
    font-size: 14px;
    min-height: 18px;
  }

  #finalScore {
    margin-top: 2px;
    font-size: 13px;
  }
}

[data-theme="dark"] body {
  background: #141414;
  color: #f0ede8;
}

[data-theme="dark"] .header,
[data-theme="dark"] .menu-card,
[data-theme="dark"] .how-card {
  background: #1f1f1f;
  color: #f0ede8;
}

[data-theme="dark"] .desc {
  color: #9a9590;
}
 .header {
  position: relative;
  padding: 12px 16px;
  border-bottom: 1px solid #ddd;
}

.title {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  font-size: 18px;
  font-weight: bold;
} 
</style>
</head>

<body>

<div class="header">
  <button class="back-btn" id="menuBackBtn" onclick="goHome()">← Back</button>
  <button class="back-btn" id="gameBackBtn" onclick="goBack()" style="display:none;">← Back</button>
  <div class ="title">Sorter Game</div>
</div>

<div id="menuScreen">
  <div class="menu-card">
    <div class="icon">📦</div>
    <h1>Sorter Game</h1>
    <div class="tag">Memory · Sorting</div>
    <p class="desc">Observe the rule and make the right move.</p>
  </div>

  <div class="how-card">
    <h2>How to Play</h2>
    <div class="step"><div class="num">1</div><div>Carefully read the rule  shown above the shape</div></div>
    <div class="step"><div class="num">2</div><div>Observe the shape or color displayed in the center</div></div>
    <div class="step"><div class="num">3</div><div>Decide if it matches and choose correct button</div></div>
  </div>

  <button class="start-btn" onclick="startGame()">▶ Start Game</button>
</div>

<div id="gameScreen">
  <div class="top-bar">
    <div>Level: <span id="level">1</span></div>
    <div>Highest: <span id="highScore">0</span></div>
    <div>Score: <span id="score">0</span></div>
  </div>

  <div class="rule" id="rule"></div>

  <canvas id="canvas" tabindex="0"></canvas>

  <div class="buttons">
    <button class="left" onclick="check('L')">LEFT</button>
    <button class="right" onclick="check('R')">RIGHT</button>
    <button class="restart" onclick="restart()">RESTART</button>
  </div>

  <div id="result"></div>
  <div id="finalScore"></div>
</div>

<script src="shared.js"></script>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const ruleEl = document.getElementById("rule");
const resultEl = document.getElementById("result");
const finalScoreEl = document.getElementById("finalScore");

const scoreEl = document.getElementById("score");
const levelEl = document.getElementById("level");
const highScoreEl = document.getElementById("highScore");

let score = 0;
let level = 1;
let highScore = 0;
let gameOver = false;

let ruleType;
let ruleValue;
let ruleSide;
let current;

const shapes = ["circle", "square", "triangle", "star"];

const colors = {
  red: "#d96f6f",
  blue: "#56aeea",
  green: "#59b77f",
  yellow: "#e5c25d"
};

const Sound = {
  ctx: null,

  isEnabled() {
    return localStorage.getItem("ctg-sound") !== "off";
  },

  init() {
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    if (!AudioContext) return;

    if (!this.ctx) {
      this.ctx = new AudioContext();
    }

    if (this.ctx.state === "suspended") {
      this.ctx.resume();
    }
  },

  tone(freq, dur) {
    if (!this.isEnabled()) return;

    this.init();
    if (!this.ctx) return;

    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();

    osc.frequency.value = freq;
    gain.gain.value = 0.15;

    osc.connect(gain);
    gain.connect(this.ctx.destination);

    osc.start();
    osc.stop(this.ctx.currentTime + dur);
  },

  correct() {
    this.tone(700, 0.12);
    setTimeout(() => this.tone(900, 0.12), 120);
  },

  wrong() {
    this.tone(220, 0.22);
  }
};

function goHome() {
  window.location.href = "index.html";
}

function goBack() {
  document.getElementById("gameScreen").style.display = "none";
  document.getElementById("menuScreen").style.display = "flex";

  document.getElementById("menuBackBtn").style.display = "block";
  document.getElementById("gameBackBtn").style.display = "none";
}

function startGame() {
  document.getElementById("menuScreen").style.display = "none";
  document.getElementById("gameScreen").style.display = "flex";

  document.getElementById("menuBackBtn").style.display = "none";
  document.getElementById("gameBackBtn").style.display = "block";

  Sound.init();
  restart();
  canvas.focus();
}

function resizeCanvas() {
  let size;

  if (window.innerWidth > window.innerHeight) {
    size = Math.min(window.innerHeight * 0.38, 180);
  } else {
    size = Math.min(window.innerWidth * 0.75, 420);
  }

  canvas.width = size;
  canvas.height = size;
}

function draw(shape, color) {
  const w = canvas.width;
  const h = canvas.height;

  ctx.clearRect(0, 0, w, h);
  ctx.fillStyle = color;

  if (shape === "circle") {
    ctx.beginPath();
    ctx.arc(w / 2, h / 2, w / 3.2, 0, Math.PI * 2);
    ctx.fill();
  }

  if (shape === "square") {
    ctx.fillRect(w * 0.18, h * 0.18, w * 0.64, h * 0.64);
  }

  if (shape === "triangle") {
    ctx.beginPath();
    ctx.moveTo(w / 2, h * 0.12);
    ctx.lineTo(w * 0.12, h * 0.85);
    ctx.lineTo(w * 0.88, h * 0.85);
    ctx.closePath();
    ctx.fill();
  }

  if (shape === "star") {
    ctx.font = (w * 0.75) + "px Arial";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText("★", w / 2, h / 2);
  }
}

function newRound() {
  if (gameOver) return;

  resultEl.innerText = "";
  finalScoreEl.innerText = "";

  ruleType =
    level <= 2
      ? "color"
      : Math.random() < 0.5
      ? "color"
      : "shape";

  ruleSide = Math.random() < 0.5 ? "LEFT" : "RIGHT";

  const shape = shapes[Math.floor(Math.random() * shapes.length)];
  const colorKeys = Object.keys(colors);
  const color = colorKeys[Math.floor(Math.random() * colorKeys.length)];

  current = { shape, color };

  ruleValue = ruleType === "color" ? color : shape;

  resizeCanvas();
  draw(shape, colors[color]);

  ruleEl.innerText =
    ruleType === "color"
      ? `If color is ${ruleValue} → ${ruleSide}`
      : `If shape is ${ruleValue} → ${ruleSide}`;

  scoreEl.innerText = score;
  levelEl.innerText = level;
  highScoreEl.innerText = highScore;
}

function updateHighScore() {
  if (score > highScore) {
    highScore = score;
    highScoreEl.innerText = highScore;
  }
}

function check(choice) {
  if (gameOver) return;

  const match =
    ruleType === "color"
      ? current.color === ruleValue
      : current.shape === ruleValue;

  const correct =
    ruleSide === "LEFT"
      ? (match && choice === "L") || (!match && choice === "R")
      : (match && choice === "R") || (!match && choice === "L");

  if (correct) {
    score++;
    updateHighScore();

    resultEl.style.color = "green";
    resultEl.innerText = "Correct ✅";

    Sound.correct();

    if (score === 5) level = 2;
    else if (score === 10) level = 3;
    else if (score === 15) level = 4;
    else if (score === 20) level = 5;
    else if (score === 25) level = 6;
    else if (score === 30) level = 7;

    setTimeout(newRound, 500);
  } else {
    gameOver = true;

    resultEl.style.color = "red";
    resultEl.innerText = "Game Over ❌";
    finalScoreEl.innerText = "Final Score: " + score;

    updateHighScore();
    Sound.wrong();
  }
}

function restart() {
  score = 0;
  level = 1;
  gameOver = false;

  resultEl.innerText = "";
  finalScoreEl.innerText = "";

  scoreEl.innerText = score;
  levelEl.innerText = level;
  highScoreEl.innerText = highScore;

  newRound();
}

window.addEventListener("resize", () => {
  resizeCanvas();

  if (current) {
    draw(current.shape, colors[current.color]);
  }
});

resizeCanvas();
document.addEventListener("keydown", function(e) {
  if (document.getElementById("gameScreen").style.display !== "flex") return;
  if (!current) return;
  if (e.key === "ArrowLeft" || e.key === "ArrowRight") {
    e.preventDefault();
    if (!gameOver) check(e.key === "ArrowLeft" ? "L" : "R");
  }
});
</script>

</body>
</html>
